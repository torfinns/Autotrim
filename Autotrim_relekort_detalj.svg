<svg viewBox="0 0 1080 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .title{font-size:25px;font-weight:700;fill:#1b2a44}
    .sub{font-size:13px;fill:#516079}
    .ch{font-size:16px;font-weight:700;fill:#1b2a44}
    .lbl{font-size:12px;fill:#1b2a44}
    .note{font-size:11px;fill:#516079}
    .tiny{font-size:9px;fill:#516079}
    .pin{font-size:11px;font-family:Consolas,monospace;fill:#1b2a44}
    .w{stroke-width:2;fill:none}
    .thin{stroke-width:1.3;fill:none}
    .dot{fill:#1b2a44}
    .relaybox{fill:none;stroke:#8e44ad;stroke-width:1.5;stroke-dasharray:6 4}
    .th{font-size:12px;font-weight:700;fill:#1b2a44}
    .td{font-size:12px;fill:#1b2a44}
    .green{fill:#cdeccd;stroke:#3a7d3a;stroke-width:1.2}
    .blue{fill:#cfe0f5;stroke:#2b5b9e;stroke-width:1.2}
  </style>

  <text x="40" y="36" class="title">Autotrim — relékort (reed-relé, direkte GPIO-drift)</text>
  <text x="40" y="56" class="sub">SIP-1A05 tegnet som databladet: kontakt 1&#8211;7, spole 3(+)/5(&#8722;) med intern diode. Ingen transistor, ingen ekstern diode.</text>
  <text x="40" y="74" class="sub">Spole: 3(+) &#8592; GPIO (3,3 V), 5(&#8722;) &#8592; GND.  Kontakt: 1 &#8592; 12V (svart, felles), 7 &#8594; Lenco-ledning.</text>

  <!-- K1 -->
  <text x="132" y="90" text-anchor="middle" class="ch">K1</text>
  <text x="132" y="106" text-anchor="middle" class="note">venstre opp (LU)</text>
  <rect x="64" y="126" width="134" height="96" rx="6" class="relaybox"/>
  <text x="190" y="138" text-anchor="end" class="note" fill="#8e44ad">SIP-1A05</text>

  <!-- contact 1..7 (open switch over top) -->
  <line x1="84" y1="216" x2="84" y2="144" class="w" stroke="#1b2a44"/>
  <line x1="84" y1="144" x2="120" y2="144" class="w" stroke="#1b2a44"/>
  <circle cx="120" cy="144" r="2.5" class="dot"/>
  <line x1="120" y1="144" x2="144" y2="133" class="w" stroke="#1b2a44"/>
  <circle cx="144" cy="144" r="2.5" class="dot"/>
  <line x1="144" y1="144" x2="180" y2="144" class="w" stroke="#1b2a44"/>
  <line x1="180" y1="144" x2="180" y2="216" class="w" stroke="#1b2a44"/>

  <!-- coil 3(+)..5(-) -->
  <line x1="120" y1="216" x2="120" y2="178" class="w" stroke="#1b2a44"/>
  <line x1="144" y1="216" x2="144" y2="178" class="w" stroke="#1b2a44"/>
  <path d="M120,178 q3,-8 6,0 q3,-8 6,0 q3,-8 6,0 q3,-8 6,0" class="w" stroke="#1b2a44"/>

  <!-- internal diode (cathode toward 3+) -->
  <line x1="144" y1="196" x2="134" y2="196" class="thin" stroke="#9aa0a6"/>
  <line x1="124" y1="196" x2="120" y2="196" class="thin" stroke="#9aa0a6"/>
  <polygon points="134,190 134,202 124,196" fill="none" stroke="#9aa0a6"/>
  <line x1="124" y1="190" x2="124" y2="202" class="thin" stroke="#9aa0a6"/>
  <text x="132" y="216" text-anchor="middle" class="tiny" fill="#9aa0a6">intern diode</text>

  <!-- pin terminals + numbers -->
  <circle cx="84" cy="216" r="4" class="dot"/>
  <circle cx="120" cy="216" r="4" class="dot"/>
  <circle cx="144" cy="216" r="4" class="dot"/>
  <circle cx="180" cy="216" r="4" class="dot"/>

  <!-- output pin7 colored stub -->
  <line x1="180" y1="216" x2="180" y2="228" class="w" stroke="#9aa0a6"/>

  <!-- vertical net labels -->
  <text x="84" y="228" transform="rotate(90 84 228)" class="pin">1 &#8594; 12V (svart)</text>
  <text x="120" y="228" transform="rotate(90 120 228)" class="pin" fill="#8e44ad">3(+) &#8594; GPIO33</text>
  <text x="144" y="228" transform="rotate(90 144 228)" class="pin">5(&#8722;) &#8594; GND</text>
  <text x="180" y="228" transform="rotate(90 180 228)" class="pin">7 &#8594; Lenco hvit</text>

  <!-- K2 -->
  <text x="382" y="90" text-anchor="middle" class="ch">K2</text>
  <text x="382" y="106" text-anchor="middle" class="note">venstre ned (LD)</text>
  <rect x="314" y="126" width="134" height="96" rx="6" class="relaybox"/>
  <text x="440" y="138" text-anchor="end" class="note" fill="#8e44ad">SIP-1A05</text>

  <!-- contact 1..7 (open switch over top) -->
  <line x1="334" y1="216" x2="334" y2="144" class="w" stroke="#1b2a44"/>
  <line x1="334" y1="144" x2="370" y2="144" class="w" stroke="#1b2a44"/>
  <circle cx="370" cy="144" r="2.5" class="dot"/>
  <line x1="370" y1="144" x2="394" y2="133" class="w" stroke="#1b2a44"/>
  <circle cx="394" cy="144" r="2.5" class="dot"/>
  <line x1="394" y1="144" x2="430" y2="144" class="w" stroke="#1b2a44"/>
  <line x1="430" y1="144" x2="430" y2="216" class="w" stroke="#1b2a44"/>

  <!-- coil 3(+)..5(-) -->
  <line x1="370" y1="216" x2="370" y2="178" class="w" stroke="#1b2a44"/>
  <line x1="394" y1="216" x2="394" y2="178" class="w" stroke="#1b2a44"/>
  <path d="M370,178 q3,-8 6,0 q3,-8 6,0 q3,-8 6,0 q3,-8 6,0" class="w" stroke="#1b2a44"/>

  <!-- internal diode (cathode toward 3+) -->
  <line x1="394" y1="196" x2="384" y2="196" class="thin" stroke="#9aa0a6"/>
  <line x1="374" y1="196" x2="370" y2="196" class="thin" stroke="#9aa0a6"/>
  <polygon points="384,190 384,202 374,196" fill="none" stroke="#9aa0a6"/>
  <line x1="374" y1="190" x2="374" y2="202" class="thin" stroke="#9aa0a6"/>
  <text x="382" y="216" text-anchor="middle" class="tiny" fill="#9aa0a6">intern diode</text>

  <!-- pin terminals + numbers -->
  <circle cx="334" cy="216" r="4" class="dot"/>
  <circle cx="370" cy="216" r="4" class="dot"/>
  <circle cx="394" cy="216" r="4" class="dot"/>
  <circle cx="430" cy="216" r="4" class="dot"/>

  <!-- output pin7 colored stub -->
  <line x1="430" y1="216" x2="430" y2="228" class="w" stroke="#c0392b"/>

  <!-- vertical net labels -->
  <text x="334" y="228" transform="rotate(90 334 228)" class="pin">1 &#8594; 12V (svart)</text>
  <text x="370" y="228" transform="rotate(90 370 228)" class="pin" fill="#8e44ad">3(+) &#8594; GPIO25</text>
  <text x="394" y="228" transform="rotate(90 394 228)" class="pin">5(&#8722;) &#8594; GND</text>
  <text x="430" y="228" transform="rotate(90 430 228)" class="pin">7 &#8594; Lenco rød</text>

  <!-- K3 -->
  <text x="632" y="90" text-anchor="middle" class="ch">K3</text>
  <text x="632" y="106" text-anchor="middle" class="note">høyre opp (RU)</text>
  <rect x="564" y="126" width="134" height="96" rx="6" class="relaybox"/>
  <text x="690" y="138" text-anchor="end" class="note" fill="#8e44ad">SIP-1A05</text>

  <!-- contact 1..7 (open switch over top) -->
  <line x1="584" y1="216" x2="584" y2="144" class="w" stroke="#1b2a44"/>
  <line x1="584" y1="144" x2="620" y2="144" class="w" stroke="#1b2a44"/>
  <circle cx="620" cy="144" r="2.5" class="dot"/>
  <line x1="620" y1="144" x2="644" y2="133" class="w" stroke="#1b2a44"/>
  <circle cx="644" cy="144" r="2.5" class="dot"/>
  <line x1="644" y1="144" x2="680" y2="144" class="w" stroke="#1b2a44"/>
  <line x1="680" y1="144" x2="680" y2="216" class="w" stroke="#1b2a44"/>

  <!-- coil 3(+)..5(-) -->
  <line x1="620" y1="216" x2="620" y2="178" class="w" stroke="#1b2a44"/>
  <line x1="644" y1="216" x2="644" y2="178" class="w" stroke="#1b2a44"/>
  <path d="M620,178 q3,-8 6,0 q3,-8 6,0 q3,-8 6,0 q3,-8 6,0" class="w" stroke="#1b2a44"/>

  <!-- internal diode (cathode toward 3+) -->
  <line x1="644" y1="196" x2="634" y2="196" class="thin" stroke="#9aa0a6"/>
  <line x1="624" y1="196" x2="620" y2="196" class="thin" stroke="#9aa0a6"/>
  <polygon points="634,190 634,202 624,196" fill="none" stroke="#9aa0a6"/>
  <line x1="624" y1="190" x2="624" y2="202" class="thin" stroke="#9aa0a6"/>
  <text x="632" y="216" text-anchor="middle" class="tiny" fill="#9aa0a6">intern diode</text>

  <!-- pin terminals + numbers -->
  <circle cx="584" cy="216" r="4" class="dot"/>
  <circle cx="620" cy="216" r="4" class="dot"/>
  <circle cx="644" cy="216" r="4" class="dot"/>
  <circle cx="680" cy="216" r="4" class="dot"/>

  <!-- output pin7 colored stub -->
  <line x1="680" y1="216" x2="680" y2="228" class="w" stroke="#8b5a2b"/>

  <!-- vertical net labels -->
  <text x="584" y="228" transform="rotate(90 584 228)" class="pin">1 &#8594; 12V (svart)</text>
  <text x="620" y="228" transform="rotate(90 620 228)" class="pin" fill="#8e44ad">3(+) &#8594; GPIO26</text>
  <text x="644" y="228" transform="rotate(90 644 228)" class="pin">5(&#8722;) &#8594; GND</text>
  <text x="680" y="228" transform="rotate(90 680 228)" class="pin">7 &#8594; Lenco brun</text>

  <!-- K4 -->
  <text x="882" y="90" text-anchor="middle" class="ch">K4</text>
  <text x="882" y="106" text-anchor="middle" class="note">høyre ned (RD)</text>
  <rect x="814" y="126" width="134" height="96" rx="6" class="relaybox"/>
  <text x="940" y="138" text-anchor="end" class="note" fill="#8e44ad">SIP-1A05</text>

  <!-- contact 1..7 (open switch over top) -->
  <line x1="834" y1="216" x2="834" y2="144" class="w" stroke="#1b2a44"/>
  <line x1="834" y1="144" x2="870" y2="144" class="w" stroke="#1b2a44"/>
  <circle cx="870" cy="144" r="2.5" class="dot"/>
  <line x1="870" y1="144" x2="894" y2="133" class="w" stroke="#1b2a44"/>
  <circle cx="894" cy="144" r="2.5" class="dot"/>
  <line x1="894" y1="144" x2="930" y2="144" class="w" stroke="#1b2a44"/>
  <line x1="930" y1="144" x2="930" y2="216" class="w" stroke="#1b2a44"/>

  <!-- coil 3(+)..5(-) -->
  <line x1="870" y1="216" x2="870" y2="178" class="w" stroke="#1b2a44"/>
  <line x1="894" y1="216" x2="894" y2="178" class="w" stroke="#1b2a44"/>
  <path d="M870,178 q3,-8 6,0 q3,-8 6,0 q3,-8 6,0 q3,-8 6,0" class="w" stroke="#1b2a44"/>

  <!-- internal diode (cathode toward 3+) -->
  <line x1="894" y1="196" x2="884" y2="196" class="thin" stroke="#9aa0a6"/>
  <line x1="874" y1="196" x2="870" y2="196" class="thin" stroke="#9aa0a6"/>
  <polygon points="884,190 884,202 874,196" fill="none" stroke="#9aa0a6"/>
  <line x1="874" y1="190" x2="874" y2="202" class="thin" stroke="#9aa0a6"/>
  <text x="882" y="216" text-anchor="middle" class="tiny" fill="#9aa0a6">intern diode</text>

  <!-- pin terminals + numbers -->
  <circle cx="834" cy="216" r="4" class="dot"/>
  <circle cx="870" cy="216" r="4" class="dot"/>
  <circle cx="894" cy="216" r="4" class="dot"/>
  <circle cx="930" cy="216" r="4" class="dot"/>

  <!-- output pin7 colored stub -->
  <line x1="930" y1="216" x2="930" y2="228" class="w" stroke="#27ae60"/>

  <!-- vertical net labels -->
  <text x="834" y="228" transform="rotate(90 834 228)" class="pin">1 &#8594; 12V (svart)</text>
  <text x="870" y="228" transform="rotate(90 870 228)" class="pin" fill="#8e44ad">3(+) &#8594; GPIO27</text>
  <text x="894" y="228" transform="rotate(90 894 228)" class="pin">5(&#8722;) &#8594; GND</text>
  <text x="930" y="228" transform="rotate(90 930 228)" class="pin">7 &#8594; Lenco grønn</text>


  <!-- caveat -->
  <text x="40" y="372" class="note" fill="#8a5a00">Merk: 3,3 V ligger under spolens must-operate (3,75 V). Test at alle 4 trekker sikkert inn — hvis ikke, mat spolen fra 5V (krever da en bryter pr. kanal).</text>

  <!-- board layout sketch (matcher bildet) -->
  <text x="40" y="408" class="th">Kort-layout (som bygd)</text>
  <rect x="40" y="418" width="300" height="260" rx="8" fill="#eaf0fb" stroke="#2b3a55" stroke-width="2"/>
  <!-- green terminals top -->
  <rect x="70" y="432" width="110" height="26" class="green"/><rect x="200" y="432" width="110" height="26" class="green"/>
  <text x="190" y="450" text-anchor="middle" class="tiny">grønne term. (8): ESP-side</text>
  <!-- relays middle -->
  <rect x="95" y="476" width="190" height="22" rx="3" fill="#222" /><text x="190" y="491" text-anchor="middle" class="tiny" fill="#fff">SIP-1A05  K1</text>
  <rect x="95" y="504" width="190" height="22" rx="3" fill="#222" /><text x="190" y="519" text-anchor="middle" class="tiny" fill="#fff">SIP-1A05  K2</text>
  <rect x="95" y="532" width="190" height="22" rx="3" fill="#222" /><text x="190" y="547" text-anchor="middle" class="tiny" fill="#fff">SIP-1A05  K3</text>
  <rect x="95" y="560" width="190" height="22" rx="3" fill="#222" /><text x="190" y="575" text-anchor="middle" class="tiny" fill="#fff">SIP-1A05  K4</text>
  <!-- blue terminals bottom -->
  <rect x="70" y="596" width="110" height="26" class="blue"/><rect x="200" y="596" width="110" height="26" class="blue"/>
  <text x="190" y="614" text-anchor="middle" class="tiny">blå term. (8): Lenco-side</text>
  <text x="55" y="648" class="note">Forslag: grønne = GPIO33,25,26,27 + GND (+5V).</text>
  <text x="55" y="664" class="note">Blå = 12V (svart) + hvit, rød, brun, grønn. Tilpass faktiske spor.</text>

  <!-- channel table -->
  <rect x="370" y="400" width="670" height="290" rx="8" fill="#eef2f8" stroke="#aab6cc" stroke-width="1.5"/>
  <text x="392" y="426" class="th">Kanal</text><text x="500" y="426" class="th">GPIO (3+)</text><text x="640" y="426" class="th">Funksjon</text><text x="860" y="426" class="th">Kontakt 7 &#8594; Lenco</text>
  <line x1="386" y1="434" x2="1024" y2="434" stroke="#aab6cc"/>
  <text x="392" y="458" class="td">K1</text><text x="500" y="458" class="td">GPIO33</text><text x="640" y="458" class="td">venstre opp (LU)</text><text x="860" y="458" class="td">hvit</text>
  <text x="392" y="486" class="td">K2</text><text x="500" y="486" class="td">GPIO25</text><text x="640" y="486" class="td">venstre ned (LD)</text><text x="860" y="486" class="td">rød</text>
  <text x="392" y="514" class="td">K3</text><text x="500" y="514" class="td">GPIO26</text><text x="640" y="514" class="td">høyre opp (RU)</text><text x="860" y="514" class="td">brun</text>
  <text x="392" y="542" class="td">K4</text><text x="500" y="542" class="td">GPIO27</text><text x="640" y="542" class="td">høyre ned (RD)</text><text x="860" y="542" class="td">grønn</text>
  <text x="392" y="578" class="th">Felles</text>
  <text x="392" y="600" class="td">Alle pinne 1 &#8594; 12V (Lenco svart).  Alle pinne 5(&#8722;) &#8594; GND.</text>
  <text x="392" y="622" class="td">Pull-down 10k anbefalt fra hver GPIO til GND (av ved boot).</text>
  <text x="392" y="650" class="note">Kontakt er upolarisert (1/7 kan byttes). Reed-kontakt galvanisk skilt fra spole/ESP.</text>
  <text x="392" y="668" class="note">Manuelle Lenco-brytere uberørt (parallellkobling).</text>
</svg>
