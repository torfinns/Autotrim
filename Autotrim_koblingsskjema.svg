<svg viewBox="0 0 1180 1020" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box{fill:#f4f7fb;stroke:#2b3a55;stroke-width:2;rx:8}
    .title{font-size:26px;font-weight:700;fill:#1b2a44}
    .sub{font-size:13px;fill:#516079}
    .mod{font-size:15px;font-weight:700;fill:#1b2a44}
    .pin{font-size:12px;fill:#1b2a44}
    .pinmono{font-size:12px;font-family:Consolas,monospace;fill:#1b2a44}
    .note{font-size:11px;fill:#516079}
    .net{font-size:11px;font-weight:700;}
    .sig{stroke-width:2;fill:none}
    .dot{fill:#1b2a44}
    .lbl{font-size:11px;fill:#33445f}
    .th{font-size:12px;font-weight:700;fill:#1b2a44}
    .td{font-size:12px;fill:#1b2a44}
  </style>

  <text x="40" y="40" class="title">Autotrim — koblingsskjema</text>
  <text x="40" y="60" class="sub">ESP32 (CP2102) · BNO055 · TBS M10N GPS · 4× reed-relé SIP-1A05 · Lenco 30077-001. Power via net-flagg (+5V / +3V3 / GND = felles stjernejord).</text>

  <!-- POWER -->
  <rect x="40" y="90" width="150" height="56" rx="8" class="box"/>
  <text x="115" y="114" text-anchor="middle" class="mod">Batteri 12V</text>
  <text x="115" y="133" text-anchor="middle" class="note">+ via sikring 2–3 A</text>

  <rect x="40" y="180" width="170" height="78" rx="8" class="box"/>
  <text x="125" y="212" text-anchor="middle" class="mod">DC-DC buck</text>
  <text x="125" y="232" text-anchor="middle" class="note">12-24V → 5V / 3A</text>
  <text x="125" y="249" text-anchor="middle" class="note">ut: +5V, GND</text>
  <line x1="115" y1="146" x2="115" y2="180" class="sig" stroke="#c0392b"/>
  <text x="122" y="168" class="lbl">12V</text>

  <!-- 5V / GND net flags from DC-DC -->
  <circle cx="150" cy="270" r="4" class="dot" fill="#c0392b"/>
  <text x="160" y="274" class="net" fill="#c0392b">+5V</text>
  <circle cx="220" cy="270" r="4" class="dot"/>
  <text x="230" y="274" class="net" fill="#1b2a44">GND</text>
  <line x1="110" y1="258" x2="110" y2="270" class="sig" stroke="#c0392b"/>
  <line x1="110" y1="270" x2="150" y2="270" class="sig" stroke="#c0392b"/>
  <line x1="160" y1="258" x2="160" y2="270" class="sig" stroke="#1b2a44"/>
  <line x1="160" y1="270" x2="220" y2="270" class="sig" stroke="#1b2a44"/>

  <!-- ESP32 -->
  <rect x="300" y="210" width="300" height="470" rx="8" class="box"/>
  <text x="450" y="238" text-anchor="middle" class="mod">ESP32 (CP2102) + breakout</text>
  <text x="450" y="256" text-anchor="middle" class="note">3,3 V logikk · BLE</text>

  <!-- ESP left power pins -->
  <text x="312" y="304" class="pin">5V / VIN</text>
  <circle cx="300" cy="300" r="4" class="dot" fill="#c0392b"/>
  <text x="312" y="334" class="pin">GND</text>
  <circle cx="300" cy="330" r="4" class="dot"/>
  <text x="200" y="294" class="net" fill="#c0392b">+5V →</text>
  <text x="200" y="324" class="net">GND →</text>
  <line x1="232" y1="300" x2="300" y2="300" class="sig" stroke="#c0392b"/>
  <line x1="232" y1="330" x2="300" y2="330" class="sig" stroke="#1b2a44"/>

  <!-- ESP right pins -->
  <g>
    <text x="588" y="288" text-anchor="end" class="pinmono">3V3</text><circle cx="600" cy="284" r="4" class="dot" fill="#e67e22"/>
    <text x="588" y="318" text-anchor="end" class="pinmono">GPIO21 SDA</text><circle cx="600" cy="314" r="4" class="dot" fill="#2980b9"/>
    <text x="588" y="343" text-anchor="end" class="pinmono">GPIO22 SCL</text><circle cx="600" cy="339" r="4" class="dot" fill="#2980b9"/>
    <text x="588" y="383" text-anchor="end" class="pinmono">GPIO16 RX2</text><circle cx="600" cy="379" r="4" class="dot" fill="#16a085"/>
    <text x="588" y="408" text-anchor="end" class="pinmono">GPIO17 TX2</text><circle cx="600" cy="404" r="4" class="dot" fill="#16a085"/>
    <text x="588" y="462" text-anchor="end" class="pinmono">GPIO33 LU</text><circle cx="600" cy="458" r="4" class="dot" fill="#8e44ad"/>
    <text x="588" y="492" text-anchor="end" class="pinmono">GPIO25 LD</text><circle cx="600" cy="488" r="4" class="dot" fill="#8e44ad"/>
    <text x="588" y="522" text-anchor="end" class="pinmono">GPIO26 RU</text><circle cx="600" cy="518" r="4" class="dot" fill="#8e44ad"/>
    <text x="588" y="552" text-anchor="end" class="pinmono">GPIO27 RD</text><circle cx="600" cy="548" r="4" class="dot" fill="#8e44ad"/>
  </g>

  <!-- BNO055 -->
  <rect x="720" y="92" width="190" height="140" rx="8" class="box"/>
  <text x="815" y="118" text-anchor="middle" class="mod">BNO055 (IMU)</text>
  <text x="815" y="135" text-anchor="middle" class="note">I2C 0x28 · 3,3 V</text>
  <text x="815" y="151" text-anchor="middle" class="note">X opp · Y tvers (kort står loddrett)</text>
  <text x="732" y="178" class="pin">Vin</text><circle cx="720" cy="174" r="4" class="dot" fill="#e67e22"/>
  <text x="732" y="200" class="pin">SDA</text><circle cx="720" cy="196" r="4" class="dot" fill="#2980b9"/>
  <text x="732" y="222" class="pin">SCL</text><circle cx="720" cy="218" r="4" class="dot" fill="#2980b9"/>
  <text x="905" y="200" text-anchor="end" class="pin">GND</text><circle cx="912" cy="196" r="4" class="dot"/>
  <text x="922" y="200" class="net">GND</text>

  <!-- GPS -->
  <rect x="720" y="252" width="190" height="120" rx="8" class="box"/>
  <text x="815" y="278" text-anchor="middle" class="mod">TBS M10N GPS</text>
  <text x="815" y="295" text-anchor="middle" class="note">UART 115200 · 5 V</text>
  <text x="732" y="322" class="pin">TX</text><circle cx="720" cy="318" r="4" class="dot" fill="#16a085"/>
  <text x="732" y="346" class="pin">RX</text><circle cx="720" cy="342" r="4" class="dot" fill="#16a085"/>
  <text x="905" y="322" text-anchor="end" class="pin">VCC</text><circle cx="912" cy="318" r="4" class="dot" fill="#c0392b"/>
  <text x="922" y="322" class="net" fill="#c0392b">+5V</text>
  <text x="905" y="346" text-anchor="end" class="pin">GND</text><circle cx="912" cy="342" r="4" class="dot"/>
  <text x="922" y="346" class="net">GND</text>

  <!-- I2C / UART / 3V3 lines ESP -> sensors -->
  <line x1="600" y1="284" x2="700" y2="284" class="sig" stroke="#e67e22"/>
  <line x1="700" y1="284" x2="700" y2="174" class="sig" stroke="#e67e22"/>
  <line x1="700" y1="174" x2="720" y2="174" class="sig" stroke="#e67e22"/>
  <line x1="600" y1="314" x2="690" y2="314" class="sig" stroke="#2980b9"/>
  <line x1="690" y1="314" x2="690" y2="196" class="sig" stroke="#2980b9"/>
  <line x1="690" y1="196" x2="720" y2="196" class="sig" stroke="#2980b9"/>
  <line x1="600" y1="339" x2="680" y2="339" class="sig" stroke="#2980b9"/>
  <line x1="680" y1="339" x2="680" y2="218" class="sig" stroke="#2980b9"/>
  <line x1="680" y1="218" x2="720" y2="218" class="sig" stroke="#2980b9"/>
  <text x="612" y="278" class="lbl">3V3→Vin</text>
  <text x="612" y="332" class="lbl">I2C</text>

  <line x1="600" y1="379" x2="720" y2="318" class="sig" stroke="#16a085"/>
  <line x1="600" y1="404" x2="720" y2="342" class="sig" stroke="#16a085"/>
  <text x="612" y="396" class="lbl">UART (kryss TX/RX)</text>

  <!-- RELAY BOARD -->
  <rect x="700" y="410" width="320" height="320" rx="8" class="box"/>
  <text x="860" y="436" text-anchor="middle" class="mod">Relékort (eget) — 4× reed SIP-1A05</text>
  <text x="860" y="453" text-anchor="middle" class="note">skruterminaler til Lenco · spole 5V, kontakt reed (galvanisk skilt)</text>

  <!-- relay rows -->
  <g>
    <!-- row template: coil box + reed -->
    <!-- Row1 LU/hvit -->
    <rect x="724" y="476" width="44" height="26" rx="4" fill="#fff" stroke="#2b3a55"/>
    <text x="746" y="493" text-anchor="middle" class="pinmono">K1</text>
    <text x="716" y="471" class="lbl">IN1</text>
    <circle cx="708" cy="489" r="4" class="dot" fill="#8e44ad"/>
    <line x1="600" y1="458" x2="660" y2="458" class="sig" stroke="#8e44ad"/>
    <line x1="660" y1="458" x2="660" y2="489" class="sig" stroke="#8e44ad"/>
    <line x1="660" y1="489" x2="708" y2="489" class="sig" stroke="#8e44ad"/>
    <!-- reed contact -->
    <circle cx="800" cy="489" r="3.5" class="dot"/><text x="792" y="475" text-anchor="end" class="lbl">COM</text>
    <line x1="800" y1="489" x2="838" y2="481" stroke="#2b3a55" stroke-width="2"/>
    <circle cx="844" cy="489" r="3.5" class="dot"/><text x="852" y="493" class="lbl">NO</text>
    <line x1="844" y1="489" x2="1000" y2="489" class="sig" stroke="#9aa0a6"/>
    <text x="900" y="484" class="lbl">hvit (LU)</text>

    <!-- Row2 LD/rød -->
    <rect x="724" y="536" width="44" height="26" rx="4" fill="#fff" stroke="#2b3a55"/>
    <text x="746" y="553" text-anchor="middle" class="pinmono">K2</text>
    <text x="716" y="531" class="lbl">IN2</text>
    <circle cx="708" cy="549" r="4" class="dot" fill="#8e44ad"/>
    <line x1="600" y1="488" x2="650" y2="488" class="sig" stroke="#8e44ad"/>
    <line x1="650" y1="488" x2="650" y2="549" class="sig" stroke="#8e44ad"/>
    <line x1="650" y1="549" x2="708" y2="549" class="sig" stroke="#8e44ad"/>
    <circle cx="800" cy="549" r="3.5" class="dot"/><text x="792" y="535" text-anchor="end" class="lbl">COM</text>
    <line x1="800" y1="549" x2="838" y2="541" stroke="#2b3a55" stroke-width="2"/>
    <circle cx="844" cy="549" r="3.5" class="dot"/><text x="852" y="553" class="lbl">NO</text>
    <line x1="844" y1="549" x2="1000" y2="549" class="sig" stroke="#c0392b"/>
    <text x="900" y="544" class="lbl">rød (LD)</text>

    <!-- Row3 RU/brun -->
    <rect x="724" y="596" width="44" height="26" rx="4" fill="#fff" stroke="#2b3a55"/>
    <text x="746" y="613" text-anchor="middle" class="pinmono">K3</text>
    <text x="716" y="591" class="lbl">IN3</text>
    <circle cx="708" cy="609" r="4" class="dot" fill="#8e44ad"/>
    <line x1="600" y1="518" x2="640" y2="518" class="sig" stroke="#8e44ad"/>
    <line x1="640" y1="518" x2="640" y2="609" class="sig" stroke="#8e44ad"/>
    <line x1="640" y1="609" x2="708" y2="609" class="sig" stroke="#8e44ad"/>
    <circle cx="800" cy="609" r="3.5" class="dot"/><text x="792" y="595" text-anchor="end" class="lbl">COM</text>
    <line x1="800" y1="609" x2="838" y2="601" stroke="#2b3a55" stroke-width="2"/>
    <circle cx="844" cy="609" r="3.5" class="dot"/><text x="852" y="613" class="lbl">NO</text>
    <line x1="844" y1="609" x2="1000" y2="609" class="sig" stroke="#8b5a2b"/>
    <text x="900" y="604" class="lbl">brun (RU)</text>

    <!-- Row4 RD/grønn -->
    <rect x="724" y="656" width="44" height="26" rx="4" fill="#fff" stroke="#2b3a55"/>
    <text x="746" y="673" text-anchor="middle" class="pinmono">K4</text>
    <text x="716" y="651" class="lbl">IN4</text>
    <circle cx="708" cy="669" r="4" class="dot" fill="#8e44ad"/>
    <line x1="600" y1="548" x2="630" y2="548" class="sig" stroke="#8e44ad"/>
    <line x1="630" y1="548" x2="630" y2="669" class="sig" stroke="#8e44ad"/>
    <line x1="630" y1="669" x2="708" y2="669" class="sig" stroke="#8e44ad"/>
    <circle cx="800" cy="669" r="3.5" class="dot"/><text x="792" y="655" text-anchor="end" class="lbl">COM</text>
    <line x1="800" y1="669" x2="838" y2="661" stroke="#2b3a55" stroke-width="2"/>
    <circle cx="844" cy="669" r="3.5" class="dot"/><text x="852" y="673" class="lbl">NO</text>
    <line x1="844" y1="669" x2="1000" y2="669" class="sig" stroke="#27ae60"/>
    <text x="900" y="664" class="lbl">grønn (RD)</text>
  </g>

  <!-- relay power net flags -->
  <text x="724" y="710" class="net" fill="#c0392b">+5V</text><text x="770" y="710" class="net">GND</text>
  <text x="724" y="725" class="note">(spole-VCC og GND til alle 4)</text>

  <!-- COM bus to svart -->
  <line x1="800" y1="489" x2="800" y2="669" class="sig" stroke="#1b2a44" stroke-width="2.5"/>
  <line x1="800" y1="700" x2="800" y2="669" class="sig" stroke="#1b2a44" stroke-width="2.5"/>
  <circle cx="800" cy="489" r="3.5" class="dot"/>
  <circle cx="800" cy="549" r="3.5" class="dot"/>
  <circle cx="800" cy="609" r="3.5" class="dot"/>
  <text x="784" y="715" text-anchor="middle" class="lbl">COM-buss</text>

  <!-- LENCO -->
  <rect x="1040" y="410" width="120" height="320" rx="8" class="box"/>
  <text x="1100" y="436" text-anchor="middle" class="mod">Lenco</text>
  <text x="1100" y="453" text-anchor="middle" class="note">30077-001</text>
  <!-- terminals -->
  <g class="pin">
    <circle cx="1040" cy="489" r="4" class="dot"/>
    <circle cx="1040" cy="549" r="4" class="dot" fill="#c0392b"/>
    <circle cx="1040" cy="609" r="4" class="dot" fill="#8b5a2b"/>
    <circle cx="1040" cy="669" r="4" class="dot" fill="#27ae60"/>
  </g>
  <text x="1052" y="475" class="lbl">svart 12V</text>
  <text x="1052" y="540" class="lbl">rød (LD)</text>
  <text x="1052" y="600" class="lbl">brun (RU)</text>
  <text x="1052" y="660" class="lbl">grønn (RD)</text>
  <!-- hvit goes to top terminal too; show hvit near svart? put hvit at 489 offset -->
  <text x="1052" y="503" class="lbl">hvit (LU)</text>
  <!-- connect svart terminal to COM bus -->
  <line x1="800" y1="700" x2="1020" y2="700" class="sig" stroke="#1b2a44" stroke-width="2.5"/>
  <line x1="1020" y1="700" x2="1020" y2="489" class="sig" stroke="#1b2a44" stroke-width="2.5"/>
  <line x1="1020" y1="489" x2="1040" y2="489" class="sig" stroke="#1b2a44" stroke-width="2.5"/>
  <text x="905" y="695" class="lbl">→ svart 12V (felles COM)</text>

  <!-- NO colored lines already reach x=1000; extend into Lenco terminals -->
  <line x1="1000" y1="489" x2="1040" y2="505" class="sig" stroke="#9aa0a6"/>
  <line x1="1000" y1="549" x2="1040" y2="549" class="sig" stroke="#c0392b"/>
  <line x1="1000" y1="609" x2="1040" y2="609" class="sig" stroke="#8b5a2b"/>
  <line x1="1000" y1="669" x2="1040" y2="669" class="sig" stroke="#27ae60"/>

  <!-- LEGEND / TABLE (flyttet ned for å ikke skygge for tilkoblinger) -->
  <rect x="40" y="760" width="540" height="200" rx="8" fill="#eef2f8" stroke="#aab6cc" stroke-width="1.5"/>
  <text x="60" y="786" class="mod">Relékanaler (parallell med Lenco-bryter)</text>
  <text x="60" y="812" class="th">Kanal</text>
  <text x="150" y="812" class="th">ESP GPIO</text>
  <text x="260" y="812" class="th">Funksjon</text>
  <text x="400" y="812" class="th">Lenco NO → ledning</text>
  <line x1="55" y1="820" x2="565" y2="820" stroke="#aab6cc"/>
  <text x="60" y="842" class="td">K1</text><text x="150" y="842" class="td">GPIO33</text><text x="260" y="842" class="td">venstre opp (LU)</text><text x="400" y="842" class="td">hvit</text>
  <text x="60" y="866" class="td">K2</text><text x="150" y="866" class="td">GPIO25</text><text x="260" y="866" class="td">venstre ned (LD)</text><text x="400" y="866" class="td">rød</text>
  <text x="60" y="890" class="td">K3</text><text x="150" y="890" class="td">GPIO26</text><text x="260" y="890" class="td">høyre opp (RU)</text><text x="400" y="890" class="td">brun</text>
  <text x="60" y="914" class="td">K4</text><text x="150" y="914" class="td">GPIO27</text><text x="260" y="914" class="td">høyre ned (RD)</text><text x="400" y="914" class="td">grønn</text>
  <text x="60" y="940" class="note">COM (alle 4) → Lenco svart (12V). Reed-kontakt galvanisk skilt fra ESP. Pull-down 10k på IN → av ved boot.</text>

  <!-- footer note -->
  <text x="600" y="788" class="note">Power-net: +5V (rød) = DC-DC ut → ESP 5V, relé-VCC, GPS VCC.</text>
  <text x="600" y="808" class="note">+3V3 (oransje) = ESP → BNO055 Vin.  GND (sort) = felles stjernejord (DC-DC −).</text>
  <text x="600" y="828" class="note">I2C pull-up 4,7k til 3V3 om ikke på BNO055-kort. GPS TX→ESP RX, GPS RX→ESP TX.</text>
  <text x="600" y="848" class="note">Relépinner 33/25/26/27: fortløpende på header, RTC, ingen boot-glitch / strapping.</text>
  <text x="600" y="868" class="note">Interlock i fastvare: aldri U+D samme side samtidig.</text>
  <text x="600" y="888" class="note">Sjekk relémodulens trigger-polaritet før lodding (aktiv-høy antatt).</text>
  <text x="600" y="908" class="note">Mål at kontakten er ÅPEN gjennom hele boot før Lenco kobles til.</text>
  <text x="600" y="934" class="note" font-weight="700" fill="#8e44ad">Relé vist forenklet. Komplett (direkte GPIO-drift): SIP-1A05</text>
  <text x="600" y="950" class="note" font-weight="700" fill="#8e44ad">pinne 1/7 kontakt, 3(+)←GPIO, 5(−)←GND, intern diode:</text>
  <text x="600" y="966" class="note" font-weight="700" fill="#8e44ad">se Autotrim_relekort_detalj.svg.</text>
</svg>
